<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body{
            background-color: rgb(194, 194, 238);

        }
        #form{
            max-width: 400px;
           margin: 0 auto;
           display: flex;
           flex-direction: column;
           background-color: rgba(91,91,91,0.273);
           border: 2px solid #444;
           padding: 20px 10px;
           justify-content: center;
           text-align: center;
           border-radius: 20px; ;
        }
          
           #input{
            background-color: white;
            padding: 15px;
            margin: 15px;
            width: 150px;
            height: 40px;
            text-align: center;
            align-items: center;
            border-radius: 10px;
           }

           
        
    </style>
</head>

<body >
   
    <form id="form" >
        <h1>Login</h1>
        <input type="text" placeholder="digite o seu numero de processo">
        <input type="email" placeholder="digite o seu email">
        <input type="contacto" placeholder="digite a sua passe">
        <input type="submit" value="Enter"  id="input">
        <p>Não tens uma conta?<a href="#">Cadastra-se</a></p>
    
    </form>
    
</body>
</html>
